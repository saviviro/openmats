name: Event correction or missing open mat
description: Report incorrect information or suggest a missing Helsinki-region open mat.
title: "Event report: "
body:
  - type: markdown
    attributes:
      value: |
        Kiitos avusta! / Thank you for helping keep the listing accurate.

        Lisää mahdollisuuksien mukaan järjestäjän oma lähdelinkki. Älä kirjoita lomakkeeseen yksityisiä yhteystietoja. / Please include an official organizer source when possible. Do not add private contact details.
  - type: dropdown
    id: report_type
    attributes:
      label: Ilmoituksen tyyppi / Report type
      options:
        - Virhe tapahtumatiedoissa / Incorrect event information
        - Puuttuva open mat / Missing open mat
    validations:
      required: true
  - type: input
    id: gym
    attributes:
      label: Sali tai järjestäjä / Gym or organizer
      placeholder: "Esimerkiksi / For example: GB Gym"
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Järjestäjän lähde / Organizer source
      description: Linkki järjestäjän sivulle, kalenteriin tai julkiseen julkaisuun / Link to the organizer's page, calendar, or public post
      placeholder: https://
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Korjaus tai puuttuvat tiedot / Correction or missing details
      description: Kerro vähintään päivämäärä ja mitä pitäisi muuttaa tai lisätä. / Include at least the date and what should be changed or added.
    validations:
      required: true
